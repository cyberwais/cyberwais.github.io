<!DOCTYPE html>
<html lang="en">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT CYBERWAIS</title>
  
  <style>

    
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #333383 0%, #b9b9e9 100%);
      background-attachment: fixed;
      flex-direction: column;
      width: 100%;
      overflow-x: hidden;
     
    }

    html {
      scroll-behavior: smooth;
      
    }


    .site-header {
      position: fixed;
      top: 20px;
      left: 1%;
      right: 1%;
      width: auto;
      height: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #aeaef1;
      opacity: 0.95;
      border-radius: 100px;
      box-shadow: 0 10px 10px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      
    }

    .logo-img {
      height: 50px;
      width: auto;
      margin-left: 20px;
    }

    .logoname {
      font-size: 24px;
      font-weight: 900;
      color: #333;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      flex-grow: 1;
      margin-left: 20px;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 15px;
      margin-right: 30px;
      padding: 0;
      font: bold 13px Arial, sans-serif;
    }

    .nav-links li a {
      display: inline-block;
      text-decoration: none;
      padding: 8px 15px;
      background-color: #d6eefc;
      border-radius: 20px;
      color: #333;
      transition: transform 0.3s ease, background-color 0.3s, box-shadow 0.3s;
    }

    .nav-links li a:hover {
      background-color: rgb(103, 103, 236);
      color: white;
      transform: translateY(-5px);
    }

    .nav-links li a:active {
      transform: translateY(2px);
    }


    .main-container {
      background: white;
      padding: 50px;
      border-radius: 25px;
      box-shadow: 20px 25px 35px rgba(0, 0, 0, 0.15);
      text-align: center;
      border: 2px solid #000;
      width: 320px;
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      margin-top: 110px;
      
    
    }

    .main-container2 {
      background: white;
      padding: 50px;
      border-radius: 25px;
      box-shadow: 20px 25px 35px rgba(0, 0, 0, 0.15);
      text-align: center;
      border: 2px solid #000;
      width: 320px;
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      margin-top: 200px;
    }

    .main-container3 {
      background: white;
      padding: 50px;
      border-radius: 25px;
      box-shadow: 20px 25px 35px rgba(0, 0, 0, 0.15);
      text-align: center;
      border: 2px solid #000;
      width: 320px;
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      margin-top: 200px;
    }





    .logo-img-container {
      height: 100px;
      width: auto;
      margin-bottom: 10px;
      transition: transform 0.3s ease;
      display: inline-block;
    }

    .rrr {
      font-weight: 1000;
      font-size: 32px;
      margin-bottom: 25px;
      background: linear-gradient(90deg, #333383 0%, #b9b9e9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      border-inline: #000 solid 2px;
      transition: text-shadow 0.3s ease;
    }


    .main-container:hover {
      box-shadow: 20px 25px 35px rgba(0, 0, 0, 0.3);
      transform: translateY(-5px);
    }

    .main-container:hover .rrr {
      text-shadow: 1px 1px 0px #333383;
    }

    .main-container:hover .logo-img-container {
      transform: scale(1.1);
    }


    .ss {
      background-color: white;
      border: 1px solid rgb(103, 103, 236);
      height: 42px;
      width: 110px;
      color: rgb(103, 103, 236);
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      border-radius: 25px;
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, background-color 0.3s, color 0.3s, box-shadow 0.3s;
    }

    .ss:hover {
      background-color: rgb(103, 103, 236);
      color: white;
      transform: translateY(-6px);
      box-shadow: 0px 12px 20px rgba(0, 0, 0, 0.3);
    }

    .ss:active {
      transform: translateY(2px);
    }

    .link-text {
      display: inline-block;
      margin-top: 20px;
      color: #666;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
    }

    .link-text:hover {
      color: rgb(103, 103, 236);
      text-decoration: underline;
    }


    @media (max-width: 768px) {
      .site-header {
        width: 94%;
        left: 3%;
        height: auto;
        padding: 10px 0;
        flex-direction: column;
        border-radius: 20px;
        margin-top: 5px;
      }

      .logoname {
        margin: 0 0 10px 0;
        font-size: 18px;
      }

      .logo-img {
        height: 50px;
        margin: 0;
      }

      .nav-links {
        margin-right: 0;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .nav-links li a {
        padding: 5px 10px;
        font-size: 11px;
      }

      .main-container {
        width: 80%;
        padding: 30px 20px;
        margin-top: 140px;
      }

      .rrr {
        font-size: 24px;
      }

      /* Touch Feedback (Mobile Only) */
      .nav-links li a:hover,
      .ss:hover {
        transform: none;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
      }

      .nav-links li a:active,
      .ss:active {
        transform: scale(0.95);
        background-color: rgb(83, 83, 216);
        transition: 0.1s;
      }
    }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="logo">
      <a href="#"><img src="logo.png" alt="CYBERWAIS LOGO" class="logo-img"></a>
    </div>
    <div class="logoname">CYBERWAIS</div>
    <nav>
      <ul class="nav-links">
        <li><a href="#home">HOME</a></li>
        <li><a href="#campaign">CAMPAIGN</a></li>
        <li><a href="#vision">VISION</a></li>
        <li><a href="#mission">MISSION</a></li>
      </ul>
    </nav>
  </header>

  <section id="home">
    <div class="main-container">
      <a href="#"><img src="logo.png" alt="CYBERWAIS LOGO" class="logo-img-container"></a>
      <div class="rrr">PROJECT CYBERWAIS</div>
      <button class="ss" onclick="document.getElementById('campaign').scrollIntoView();">EXPLORE</button>
      <div style="margin-top: 20px;">
        <a target="_blank" href="https://google.com" style="color:#666; text-decoration:none; font-size:13px;">CONTACT
          US</a>
      </div>
    </div>
  </section>

  <section id="campaign">
    <div class="main-container2">
      <div class="rrr">CAMPAIGN</div>
      <p>Cyber awareness strategies and active defense logs go here.</p>
    </div>
  </section>

  <section id="vision">
    <div class="main-container3">
      <div class="rrr">VISION</div>
      <p>A secure digital landscape for every user.</p>
    </div>
  </section>

  <section id="mission">
    <div class="main-container">
      <div class="rrr">MISSION</div>
      <p>Educating and empowering users against online threats.</p>
    </div>
  </section>

  <footer style="padding: 20px; text-align: center; width: 100%;">
    <span style="font-size: 12px; color: #333;">Made by CYBERWAIS LEh jet</span>
  </footer>

</body>

</html>
