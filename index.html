<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT CYBERWAIS</title>
  <style>
    /* 1. GLOBAL & BACKGROUND */
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #333383 0%, #b9b9e9 100%);
      background-attachment: fixed; /* Keeps gradient stable during scroll */
    }

    /* 2. HEADER NAVIGATION */
    .site-header {
      position: fixed;
      top: 20px;
      left: 1%;
      width: 98%;
      height: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #aeaef1;
      opacity: 0.95;
      border-radius: 100px;
      box-shadow: 0 10px 10px rgba(0, 0, 0, 0.2);
      z-index: 1000;
    }

    .logo-img {
      height: 50px;
      width: auto;
      margin-left: 20px;
    }

    .logo-img-container {
      height: 100px;
      width: auto;
      margin-left: 2px;
      

    }

    .logoname {
      font-size: 24px;
      font-weight: 900;
      color: #333;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      flex-grow: 1;
      margin-left: 20px;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 15px;
      margin-right: 30px;
      padding: 0;
      font: bold 13px Arial, sans-serif;
      transition: transform 0.5s ease, background-color 0.5s, box-shadow 0.5s;
      
    }

    .nav-links li a {
      text-decoration: none;
      padding: 8px 15px;
      background-color: #d6eefc;
      border-radius: 20px;
      color: #333;
      transition: 0.3s ease;
    }

    .nav-links li a:hover {
      background-color: rgb(103, 103, 236);
      color: white;
    }
    .nav-links:hover {
      transform: translateY(-3px);
    }
    .nav-links:active {
      transition: transform 0.5s ease, background-color 0.5s, box-shadow 0.5s;
      transform: translateY( 2px);
    }
    /* 3. MAIN CONTENT CARD */
    .main-container {
      background-color: white;
      padding: 50px;
      border-radius: 25px;
      box-shadow: 20px 25px 35px rgba(0, 0, 0, 0.15);
      text-align: center;
      border: 2px solid #000;
      width: 320px;
    }

    .rrr {
      font-weight: 1000;
      font-size: 32px;
      margin-bottom: 25px;
      background: linear-gradient(90deg, #333383 0%, #b9b9e9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 4. OPTIMIZED .ss BUTTON */
    .ss {
      background-color: white;
      border: 1px solid rgb(103, 103, 236);
      height: 42px;
      width: 110px;
      color: rgb(103, 103, 236);
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      border-radius: 25px;
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
      /* Combined transitions for efficiency */
      transition: transform 0.3s ease, background-color 0.3s, color 0.3s, box-shadow 0.3s;
    }

    .ss:hover {
      background-color: rgb(103, 103, 236);
      color: white;
      transform: translateY(-6px);
      box-shadow: 0px 12px 20px rgba(0, 0, 0, 0.3);
    }

    .ss:active {
      transform: translateY(-2px);
      transform: translateY( 2px);
    }

    .link-text {
      display: inline-block;
      margin-top: 20px;
      color: #666;
      text-decoration: none;
      font-size: 13px;
      transition: 0.2s;
    }

    .link-text:hover {
      color: rgb(103, 103, 236);
      text-decoration: underline;
    }

    /* THE MOBILE ADAPTATION */
  @media (max-width: 768px) {
    
    .site-header {
      width: 94%;
      left: 3%;
      height: auto;
      padding: 10px 0;
      flex-direction: column; 
      border-radius: 20px;
    }

    .logoname {
      margin-left: 0;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .logo-img {
      height: 40px;
    }

    .logo-img-container {
      height: 50px;
    }

    .nav-links {
      margin-right: 0;
      gap: 10px;
      flex-wrap: wrap; 
      justify-content: center;
    }

    .nav-links li a {
      padding: 5px 10px;
      font-size: 11px;
    }

    /* 2. Adjust the Main Container */
    .main-container {
      width: 65%; /* Uses percentage instead of fixed px */
      padding: 30px 20px;
      margin-top: 140px; /* Space for the stacked header */
    }

    .rrr {
      font-size: 24px;
    }
  }



    
  </style>
</head>

<body>

  <header class="site-header">
    <div class="logo">
      <a href="#"><img src="logo.png" alt="CYBERWAIS LOGO" class="logo-img"></a>
    </div>
    <div class="logoname">CYBERWAIS</div>
    <nav>
      <ul class="nav-links">
        <li><a href="#">HOME</a></li>
        <li><a href="#">CAMPAIGN</a></li>
        <li><a href="#">VISION</a></li>
        <li><a href="#">MISSION</a></li>
      </ul>
    </nav>
  </header>

  <div class="main-container">
    <a href="#"><img src="logo.png" alt="CYBERWAIS LOGO" class="logo-img-container"></a>
    <div class="rrr">PROJECT CYBERWAIS</div>
    
    <button class="ss" onclick="window.open('MainUI.html', '_self')">EXPLORE</button>
    
    <div style="margin-top: 20px;">
      <a target="_blank" href="https://google.com" class="link-text">CONTACT US</a>
      <span style="color: #ccc; margin: 0 10px;">|</span>
      <a target="_blank" href="#" class="link-text">RESOURCES</a>
    </div>
  </div>

</body>
</html>
